name: Cost Tracking

on:
  push:
    branches: [ "**" ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Track job duration
        run: |
          echo "Job started at $(date)" > cost.log
          sleep 2   # simulate workload
          echo "Job ended at $(date)" >> cost.log

      - name: Estimate resource usage
        run: |
          echo "CPU load:" >> cost.log
          uptime >> cost.log
          echo "Memory usage:" >> cost.log
          free -h >> cost.log

      - name: Upload cost report
        uses: actions/upload-artifact@v4
        with:
          name: cost-report
          path: cost.log
